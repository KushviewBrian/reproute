name: Ingest Overture Places

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: "Bounding box as min_lng,min_lat,max_lng,max_lat"
        required: false
        default: "-86.5,41.5,-84.5,42.5"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install script dependencies
        run: pip install overturemaps duckdb==1.4.1 "sqlalchemy==2.0.43" "psycopg[binary]==3.2.10" shapely pandas

      - name: Download Overture places
        run: |
          overturemaps download \
            --bbox="${{ github.event.inputs.bbox }}" \
            -f geoparquet \
            --type=place \
            -o /tmp/places.parquet

      - name: Ingest into Supabase
        env:
          DATABASE_URL: ${{ secrets.INGEST_DATABASE_URL }}
        run: |
          PYTHONPATH=$PYTHONPATH:$(pwd) python scripts/ingest_overture.py \
            --parquet /tmp/places.parquet \
            --database-url "$DATABASE_URL"
