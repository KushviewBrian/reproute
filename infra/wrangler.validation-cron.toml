name = "reproute-validation-cron"
main = "validation-cron.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 */6 * * *"]

# Secrets — do NOT put real values here; set via:
#   npx wrangler secret put BACKEND_URL --config wrangler.validation-cron.toml
#   npx wrangler secret put VALIDATION_HMAC_SECRET --config wrangler.validation-cron.toml
[vars]
BACKEND_URL = "https://reproute-backend.onrender.com"

[env.staging]
name = "reproute-validation-cron-staging"

[triggers]
crons = ["0 */6 * * *"]
