services:
  - type: web
    name: reproute-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: POC_MODE
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        value: https://reproute-8vhf.onrender.com
      - key: GEOCODE_WORKER_URL
        value: https://photon.komoot.io/api/
      - key: ORS_BASE_URL
        value: https://api.openrouteservice.org
      - key: ORS_API_KEY
        sync: false

  - type: web
    name: reproute-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: .
    healthCheckPath: /
    dockerBuildArgs:
      - VITE_API_BASE_URL=https://reproute.onrender.com
      - VITE_MAP_PMTILES_URL=https://protomaps.github.io/basemaps-assets/tiles/v3/{z}/{x}/{y}.mvt
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
