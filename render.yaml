services:
  - type: web
    name: reproute-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: POC_MODE
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: GEOCODE_WORKER_URL
        value: https://photon.komoot.io/api/
      - key: ORS_BASE_URL
        value: https://api.openrouteservice.org
      - key: ORS_API_KEY
        sync: false
